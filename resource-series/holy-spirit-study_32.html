  },
  "Job 33:4": {
    verse: "The Spirit of God has made me, and the breath of the Almighty gives me life.",
    note: "Elihu's theological self-understanding — spoken by one of Job's friends, but this statement is sound. The Spirit is not just Israel's empowering presence — he is the origin of every human being. This democratizes the Spirit's creative work: he is not only at Sinai or in the tabernacle, he is in every person who breathes.",
    godReveals: "The Spirit's creative work precedes all covenant distinctions. Every human being — believer or not — exists because the Spirit gave life. This grounds universal human dignity in pneumatology.",
    crossRefs: ["Gen 2:7", "Ps 104:30", "Eccl 12:7", "Acts 17:28"]
  },
  "Isa 11:1-3": {
    verse: "There shall come forth a shoot from the stump of Jesse... And the Spirit of the LORD shall rest upon him — the Spirit of wisdom and understanding, the Spirit of counsel and might, the Spirit of knowledge and the fear of the LORD.",
    note: "Isaiah's messianic Spirit portrait. The 'stump of Jesse' signals something that looked dead will shoot again. Seven-fold Spirit on the coming King — wisdom, understanding, counsel, might, knowledge, fear of the Lord. 'Rest upon' (not just rush upon) anticipates John 1:32-33: 'the Spirit descended and remained on him.' This is Spirit in fullness, not episodes.",
    godReveals: "The fullness of the Spirit finds its proper home in Christ. Every gift the Spirit gives believers is first perfectly present in Jesus — the one on whom the Spirit rests without measure (John 3:34).",
    crossRefs: ["John 1:32-33", "John 3:34", "Luke 4:1,14", "Matt 3:16"]
  },
  "Isa 42:1-2": {
    verse: "Behold my servant, whom I uphold, my chosen, in whom my soul delights; I have put my Spirit upon him; he will bring forth justice to the nations.",
    note: "The first Servant Song. Matthew quotes this at Jesus' healing ministry (Matt 12:18). The Spirit is on the Servant for a specific justice-oriented mission to the nations — not just to Israel. The Spirit's anointing always has a direction outward, toward those who need what the servant carries.",
    godReveals: "The Spirit-anointed mission of God is not about religious performance or institutional maintenance — it is oriented toward justice for the nations. The Spirit always propels outward.",
    crossRefs: ["Isa 61:1-2", "Matt 12:18,28", "Luke 4:1,14", "Acts 10:38"]
  },
  "Isa 61:1-2": {
    verse: "The Spirit of the Lord GOD is upon me, because the LORD has anointed me to bring good news to the poor; he has sent me to bind up the brokenhearted, to proclaim liberty to the captives.",
    note: "Jesus reads this in the Nazareth synagogue and says 'Today this Scripture is fulfilled in your hearing' (Luke 4:21). The Spirit's anointing of the Messiah is for a specific mission to the poor, brokenhearted, and captive. The Spirit always has a direction: toward those who need liberation.",
    godReveals: "The Spirit-anointed mission is oriented toward the broken and marginalized. The Spirit's presence in our lives should produce the same gravitational pull toward those in need that it produced in Jesus.",
    crossRefs: ["Isa 42:1-2", "Luke 4:1,14", "Matt 12:18,28", "Acts 10:38"]
  },
  "Isa 63:10-14": {
    verse: "But they rebelled and grieved his Holy Spirit; therefore he turned to be their enemy and himself fought against them... Where is he who put in the midst of them his Holy Spirit?",
    note: "One of only three uses of 'Holy Spirit' in the OT. Israel's rebellion is specifically described as grieving the Spirit — making him hostile. The same verb (grieved) appears in Eph 4:30. Yet the context is lament and longing: 'Where is the one who led them by his Spirit?' Even in judgment, there is remembrance of the Spirit's past presence and a longing for restoration.",
    godReveals: "The Spirit can be grieved — and when sufficiently grieved, his orientation shifts from advocate to adversary. This is not abandonment but covenant consequence. The Spirit's grief is the grief of love betrayed.",
    crossRefs: ["Ps 51:11", "Eph 4:30", "1 Thess 5:19", "Neh 9:20,30"]
  },
  "Isa 59:21": {
    verse: "'And as for me, this is my covenant with them,' says the LORD: 'My Spirit that is upon you, and my words that I have put in your mouth, shall not depart out of your mouth, or out of the mouth of your offspring, or out of the mouth of your children's offspring,' says the LORD, 'from this time forth and forevermore.'",
    note: "A covenant of permanent Spirit and Word together — from generation to generation, forever. This is the OT pointing toward the NT sealed Spirit. The Spirit and the Scripture are paired: you cannot have the Spirit without the Word, and the Word is illuminated by the Spirit. This multi-generational promise anticipates the NT's universal indwelling.",
    godReveals: "God's covenant of presence is not individual and temporary but communal and permanent. The Spirit and Word working together is the shape of the new covenant community across all generations.",
    crossRefs: ["Jer 31:31-34", "Ezek 36:26-27", "Eph 1:13-14", "John 14:16-17"]
  },
  "Joel 2:28-29": {
    verse: "And it shall come to pass afterward, that I will pour out my Spirit on all flesh; your sons and your daughters shall prophesy, your old men shall dream dreams, and your young men shall see visions. Even on the male and female servants in those days I will pour out my Spirit.",
    note: "The most radical Spirit-promise in the OT. All flesh — not selected leaders, not Israelites only, not men only. Sons and daughters. Old and young. Even servants. Every social barrier is explicitly demolished. Peter quotes it at Pentecost as the explanation for what everyone is witnessing. This is the hinge verse between OT selectivity and NT universality.",
    godReveals: "God's ultimate intention was always Spirit-abundance for all people. The OT's selectivity was provisional — a season pointing toward a universal outpouring that overflows every human category.",
    crossRefs: ["Num 11:29", "Acts 2:1-4", "Acts 10:44-48", "Gal 3:28"]
  },
  "Ezek 1": {
    verse: "Wherever the spirit would go, they went, without turning as they went... the spirit of the living creatures was in the wheels.",
    note: "Ezekiel's vision of the divine chariot (merkavah). The Spirit animates and directs the entire structure — the living creatures, the wheels, the movement. Nothing moves independently of the Spirit. This sovereign, freely-moving Spirit is the same one Jesus describes in John 3:8 ('the wind blows where it wishes'). He cannot be predicted, contained, or directed by anyone outside the Godhead.",
    godReveals: "The Spirit's sovereignty is total. He is not a resource that creation manages — he is the living director of all things. This vision is meant to overwhelm human attempts to systematize or control the Spirit's movement.",
    crossRefs: ["John 3:8", "Ezek 2:2", "1 Cor 12:11", "Acts 8:29,39"]
  },
  "Ezek 36:26-27": {
    verse: "And I will give you a new heart, and a new spirit I will put within you. And I will remove the heart of stone from your flesh and give you a heart of flesh. And I will put my Spirit within you, and cause you to walk in my statutes.",
    note: "The new covenant promise in its clearest OT form. God doesn't change the rules — he changes the person who relates to the rules. The Spirit moves from external empowerment (OT pattern) to internal transformation (NT fulfillment). Obedience becomes possible not through greater effort but through a transplanted heart and an indwelling Spirit.",
    godReveals: "God's solution to human disobedience is not stricter law but internal renovation. He takes full responsibility for producing what he requires. This is grace at its deepest: God providing what he commands.",
    crossRefs: ["Jer 31:31-34", "John 3:5-8", "Rom 8:9-11", "Titus 3:5-6"]
  },
  "Ezek 37": {
    verse: "'Prophesy to the breath; say to the breath, Thus says the Lord GOD: Come from the four winds, O breath, and breathe on these slain, that they may live.' So I prophesied as he commanded me, and the breath came into them, and they lived.",
    note: "The Valley of Dry Bones — the most vivid picture of Spirit-as-life-giver in the OT. Israel is spiritually dead, scattered, hopeless. The Spirit comes not to empower the living but to resurrect the dead. The same Hebrew word (ruach) serves as wind, breath, and spirit throughout, deliberately echoing Gen 2:7. This is new creation language applied to national restoration.",
    godReveals: "The Spirit specializes in dead things. He doesn't merely assist those already trying — he raises those with no capacity at all. Spiritual life is entirely a work of God.",
    crossRefs: ["Gen 2:7", "Gen 1:2", "John 3:5-8", "Rom 8:11", "John 20:22"]
  },
  "Matt 1:18-20": {
    verse: "She was found to be with child from the Holy Spirit... Joseph, son of David, do not fear to take Mary as your wife, for that which is conceived in her is from the Holy Spirit.",
    note: "The incarnation is a Spirit-event. The eternal Son does not bypass the Spirit to enter human history — he enters through the Spirit's creative act. This establishes from the beginning that Jesus' entire life, ministry, death, and resurrection are Spirit-saturated. He is not empowered by the Spirit despite being God — as fully human, he lives in Spirit-dependence.",
    godReveals: "The Spirit is the agent of God's most intimate entry into human existence. The incarnation itself is pneumatological — God becoming flesh is a Spirit-event. This means there is no gap in God's history where the Spirit is absent.",
    crossRefs: ["Luke 1:35", "Isa 7:14", "John 1:14", "Heb 9:14"]
  },
  "Matt 3:11,16": {
    verse: "He will baptize you with the Holy Spirit and fire... And when Jesus was baptized, the Spirit of God descended like a dove and came to rest on him.",
    note: "John's baptism is preparatory. Jesus' baptism is the messianic anointing — public, witnessed, confirmed by the Father's voice. The Spirit descends and rests (remains) on Jesus — not temporarily but permanently. The Spirit-and-fire baptism John promises combines purification and empowerment in the coming new covenant age. The Trinitarian shape of this moment is unmistakable.",
    godReveals: "The Father, Son, and Spirit are all present at Jesus' baptism — the clearest Trinitarian moment in the Gospels. The Spirit's presence publicly identifies and anoints the Messiah for mission.",
    crossRefs: ["Isa 11:1-3", "John 1:32-33", "Luke 4:1,14", "Acts 2:1-4"]
  },
  "Matt 4:1": {
    verse: "Then Jesus was led up by the Spirit into the wilderness to be tempted by the devil.",
    note: "The Spirit who descended at baptism immediately leads Jesus into the wilderness. Not into ministry, not into triumph — into trial. Mark's version is even more stark: 'the Spirit drove him out into the wilderness' (ekballei — the same word used for casting out demons). The Spirit's first act after the anointing is to lead Jesus into a place of testing and deprivation.",
    godReveals: "The Spirit leads into wilderness as well as victory. His guidance is not always toward comfort. The Spirit-led path often passes through places of testing — which is the same pattern God used with Israel (Deut 8:2) and uses with his people today.",
    crossRefs: ["Mark 1:12", "Luke 4:1", "Deut 8:2", "1 Cor 10:13"]
  },
  "Matt 12:28": {
    verse: "But if it is by the Spirit of God that I cast out demons, then the kingdom of God has come upon you.",
    note: "Jesus' definitive statement on his exorcisms. They are signs that the kingdom has actually arrived — not is coming, has come. The Beelzebul controversy is the backdrop: the Pharisees attribute Jesus' Spirit-empowered work to Satan. Jesus warns that this inversion — calling the Spirit's work demonic — is the most dangerous error possible.",
    godReveals: "The kingdom of God arrives wherever the Spirit's power confronts darkness. The Spirit's work is always cosmic in its implications, not merely personal or religious.",
    crossRefs: ["Matt 12:31-32", "Luke 11:20", "Acts 10:38", "Eph 6:17-18"]
  },
  "Matt 12:31-32": {
    verse: "Therefore I tell you, every sin and blasphemy will be forgiven people, but the blasphemy against the Spirit will not be forgiven.",
    note: "The unforgivable sin — attributing the Spirit's clear work to Satan. This is not a sin committed accidentally or in ignorance. It is a settled, deliberate inversion of the moral order: seeing God's holiness as demonic. The reason it is unforgivable is not that God's mercy is insufficient but that a person in this state has lost the capacity to recognize and receive it.",
    godReveals: "The Spirit's work is serious enough to be treated with ultimate gravity. Rejecting him is not a minor error — it is the rejection of the very means by which God's grace is communicated. This warning should produce reverence, not fear — it is not addressed to those who worry they have committed it.",
    crossRefs: ["Matt 12:28", "Mark 3:29", "Heb 6:4-6", "1 John 5:16"]
  },
  "Matt 28:19": {
    verse: "Go therefore and make disciples of all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit.",
    note: "The Great Commission's Trinitarian formula is not incidental — disciples are initiated into relationship with the full Triune God. 'Name' (singular, not plural) indicates one God in three persons. The Spirit is co-equal with the Father and Son. Mission is Trinitarian from the ground up — the Spirit is not an optional add-on to Christian initiation.",
    godReveals: "Christian mission brings people into Trinitarian relationship. The Spirit is not a secondary divine influence — he is one of the three divine persons into whose name every disciple is baptized.",
    crossRefs: ["John 14:16-17", "Acts 2:38", "Eph 1:13-14", "2 Cor 13:14"]
  },
  "Mark 1:10-12": {
    verse: "And when he came up out of the water, immediately he saw the heavens being torn open and the Spirit descending on him like a dove. And a voice came from heaven... The Spirit immediately drove him out into the wilderness.",
    note: "Mark's account is the most compressed and urgent. 'Immediately' twice in quick succession. The heavens are 'torn open' — a violent rending (schizo), not a gentle parting. The Spirit 'drove' (ekballo) Jesus into the wilderness — the same word used for exorcism. Mark's Gospel is urgent, compressed, powerful. The Spirit is the engine driving the entire narrative.",
    godReveals: "The Spirit's power is not gentle and sentimental — it can be urgent, forceful, and disruptive of normal patterns. Mark's account challenges any domesticated view of the Spirit as merely comforting.",
    crossRefs: ["Matt 3:16", "Matt 4:1", "Luke 4:1", "Isa 63:19"]
  },
  "Luke 4:1,14": {
    verse: "And Jesus, full of the Holy Spirit, returned from the Jordan and was led by the Spirit in the wilderness... And Jesus returned in the power of the Spirit to Galilee.",
    note: "Luke's Spirit-geography of Jesus' early ministry: full of the Spirit at the Jordan, led by the Spirit through the wilderness, returning in the power of the Spirit to Galilee. The Spirit is the constant narrative thread. Luke is the most Spirit-focused Gospel writer — his account of Jesus is explicitly pneumatological from beginning to end.",
    godReveals: "Spirit-fullness precedes Spirit-power. Jesus was full of the Spirit before he did anything — the power came from that prior fullness, not from his efforts. This sequence is the pattern for Christian ministry.",
    crossRefs: ["Luke 1:15", "Acts 1:8", "Acts 2:1-4", "Eph 5:18"]
  },
  "Luke 11:13": {
    verse: "If you then, who are evil, know how to give good gifts to your children, how much more will the heavenly Father give the Holy Spirit to those who ask him!",
    note: "The Lukan version of the Lord's Prayer context. In Matthew, the 'good things' are generic; Luke specifies: the Father gives the Holy Spirit. The Spirit is the gift that encompasses all other gifts. The logic is a fortiori — from lesser (flawed human parents giving good gifts) to greater (perfect Father giving the greatest gift). The Spirit is available to those who simply ask.",
    godReveals: "The Father's deepest desire is to give his own Spirit to his children. This is not reluctant charity — it is what he most wants to give. The Spirit is not the reward for extraordinary spiritual achievement; he is available to anyone who asks.",
    crossRefs: ["John 7:37-39", "Acts 2:38", "Gal 4:4-7", "Rom 8:15"]
  },
  "John 3:5-8": {
    verse: "Unless one is born of water and the Spirit, he cannot enter the kingdom of God... The wind blows where it wishes, and you hear its sound, but you do not know where it comes from or where it goes. So it is with everyone who is born of the Spirit.",
    note: "Jesus tells Nicodemus — a religious expert — that he cannot see or enter the kingdom without a second birth from above. The Spirit/wind metaphor is deliberate: the same Greek word (pneuma) means both. You don't control the wind; you feel its effects. New birth is not a human decision that God ratifies — it is a divine act that produces human response.",
    godReveals: "Spiritual life has a divine origin, not a human one. No amount of religious achievement or moral effort produces the birth that only the Spirit can give. This is both humbling and liberating — it removes the weight of self-generated spirituality.",
    crossRefs: ["Ezek 36:26-27", "Titus 3:5-6", "John 20:22", "Rom 8:9-11"]
  },
  "John 7:37-39": {
    verse: "'If anyone thirsts, let him come to me and drink. Whoever believes in me, as the Scripture has said, Out of his heart will flow rivers of living water.' Now this he said about the Spirit, whom those who believed in him were to receive, for as yet the Spirit had not been given, because Jesus had not yet been glorified.",
    note: "Jesus shouts this on the final day of the Feast of Tabernacles during the water-drawing ceremony. John's editorial note is crucial: the Spirit had not yet been given because Jesus had not yet been glorified. The Spirit's coming is inseparable from the completed work of the cross and resurrection. You cannot have the Spirit on a different basis than the atonement.",
    godReveals: "Every work of the Spirit flows from the completed work of Christ. The Spirit is not available on a different basis than the cross. This guards against any spirituality that bypasses the death and resurrection of Jesus.",
    crossRefs: ["John 14:16-17", "John 20:22", "Acts 2:33", "1 Cor 15:45"]
  },
  "John 14:16-26": {
    verse: "I will ask the Father, and he will give you another Helper, to be with you forever, even the Spirit of truth... he dwells with you and will be in you. I will not leave you as orphans... The Helper, the Holy Spirit, whom the Father will send in my name, he will teach you all things.",
    note: "The Paraclete (parakletos — Advocate, Helper, Comforter) is 'another' of the same kind as Jesus — not a replacement but a continuation and an intensification. The shift from 'with you' to 'in you' is the defining NT movement from OT Spirit-upon to new covenant Spirit-within. First two functions: teaching and remembering. Not feelings — cognitive, Word-anchored work.",
    godReveals: "Jesus does not consider leaving his disciples alone to be an option. The Spirit is the answer to spiritual orphanhood — not an upgrade but the continuation of Jesus' own presence in a new mode. The Spirit's ministry is always Christ-shaped and Christ-directed.",
    crossRefs: ["John 15:26", "John 16:7-15", "Rom 8:26-27", "1 Cor 2:10-14"]
  },
  "John 16:7-15": {
    verse: "It is to your advantage that I go away, for if I do not go away, the Helper will not come to you... When he comes, he will convict the world concerning sin and righteousness and judgment... He will glorify me, for he will take what is mine and declare it to you.",
    note: "The Spirit's fullest job description. Three roles toward the world: convict of sin, of righteousness (Christ's vindication in resurrection), of judgment (Satan's defeat). Two roles toward disciples: guide into all truth, glorify Christ. The Spirit is never self-promoting — his entire ministry points away from himself toward the Son. Any 'Spirit movement' that diminishes Christ is theologically suspect.",
    godReveals: "The Spirit's deepest identity is his Christ-exalting orientation. He does not have an independent agenda. This is a profound statement about the inner life of the Trinity — the Spirit delights to make the Son known.",
    crossRefs: ["John 14:16-26", "John 15:26", "1 Cor 12:3", "1 John 4:2"]
  },
  "John 20:22": {
    verse: "And when he had said this, he breathed on them and said to them, 'Receive the Holy Spirit.'",
    note: "The risen Jesus breathes on the disciples — a deliberate echo of Gen 2:7 (God breathes life into Adam) and Ezek 37 (breath comes into dry bones). This is new creation. The first Adam received the breath of physical life; the disciples receive the breath of resurrection life. The Spirit here is the Spirit of the risen Christ — the same Spirit that raised Jesus from the dead (Rom 8:11).",
    godReveals: "Resurrection and the Spirit belong together. The Spirit who raised Jesus is the Spirit who indwells believers. The power at work in every Christian is resurrection power — the most powerful force in the universe applied to ordinary lives.",
    crossRefs: ["Gen 2:7", "Ezek 37", "Rom 8:11", "Acts 2:1-4"]
  },
  "Acts 2:1-4": {
    verse: "And suddenly there came from heaven a sound like a mighty rushing wind, and it filled the entire house where they were sitting. And divided tongues as of fire appeared to them and rested on each one of them. And they were all filled with the Holy Spirit.",
    note: "Pentecost is the fulfillment of Joel 2, the answer to Moses' prayer in Numbers 11, the realization of Ezekiel 36, and the completion of John 7:37-39. Wind and fire echo Sinai — this is a new covenant Sinai, a new law written not on stone but on hearts. The tongues reverse Babel — division undone, the nations addressed. Everything the OT pointed toward arrives in one morning.",
    godReveals: "God keeps his promises — but on a scale and timeline that surprises everyone. The disciples had been waiting ten days. The Spirit had been promised for centuries. God's timing is always perfect, even when it feels delayed.",
    crossRefs: ["Joel 2:28-29", "Num 11:29", "Ezek 36:26-27", "John 7:37-39"]
  },
  "Acts 5:3-4": {
    verse: "But Peter said, 'Ananias, why has Satan filled your heart to lie to the Holy Spirit?... You have not lied to man but to God.'",
    note: "The equation is explicit: lying to the Spirit = lying to God. This is the clearest statement of the Spirit's full divinity in Acts. The Spirit is not a force, an influence, or a lesser being — he is God. This has direct implications for how seriously we treat grieving, quenching, or insulting him in our lives.",
    godReveals: "The Spirit's personhood and divinity are not theological abstractions — they have moral weight in everyday community life. Dishonesty within the Spirit's community is dishonesty toward God himself.",
    crossRefs: ["Eph 4:30", "1 Thess 5:19", "Heb 10:29", "Acts 13:1-4"]
  },
  "Acts 8:29,39": {
    verse: "And the Spirit said to Philip, 'Go over and join this chariot.' ... And when they came up out of the water, the Spirit of the Lord carried Philip away, and the eunuch saw him no more.",
    note: "The Spirit gives Philip a direct command — precise, specific, situational. After the baptism, the Spirit removes Philip entirely. These are the most dramatic physical Spirit-manifestations in Acts. The Ethiopian eunuch goes home to start the church that still exists in Ethiopia today — one Spirit-directed conversation with massive generational consequences.",
    godReveals: "The Spirit's direction is specific and responsive to individual situations. He is not a general force — he speaks to particular people about particular people at particular moments. His micro-direction has macro-consequences.",
    crossRefs: ["1 Kgs 18:12", "Acts 13:1-4", "John 3:8", "Ezek 1"]
  },
  "Acts 10:44-48": {
    verse: "While Peter was still saying these things, the Holy Spirit fell on all who heard the word. And the believers from among the circumcised who had come with Peter were amazed, because the gift of the Holy Spirit was poured out even on the Gentiles.",
    note: "The Spirit arrives before Peter can finish — sovereignty overriding religious protocol. The Jewish believers are 'amazed' (existemi — stood outside themselves). The point is not primarily tongues; it is the Spirit demolishing the ethnic barrier. Peter's defense at Jerusalem uses this event as the argument: 'Who was I to stand in God's way?' The Spirit's presence is the proof of God's acceptance.",
    godReveals: "The Spirit is not the property of any ethnic, cultural, or religious group. He goes where he wills (John 3:8), and his arrival is the Father's announcement of acceptance — which no human institution can veto.",
    crossRefs: ["Joel 2:28-29", "Acts 11:12", "Acts 15:8-9", "Gal 3:28"]
  },
  "Acts 13:1-4": {
    verse: "While they were worshiping the Lord and fasting, the Holy Spirit said, 'Set apart for me Barnabas and Saul for the work to which I have called them.' ... So, being sent out by the Holy Spirit, they went.",
    note: "Mission strategy emerges from worship and fasting, not strategic planning. The Spirit speaks to the assembled community — not just the leadership — with specific direction. Luke's double statement matters: sent by the church (v.3) AND sent by the Holy Spirit (v.4). These are not in competition — the Spirit works through the gathered community's prayerful discernment.",
    godReveals: "The Spirit is an active mission strategist, not a passive resource. He initiates, directs, and sends. The church's role is responsive obedience to his direction — which comes in the context of worship, prayer, and fasting, not just strategic analysis.",
    crossRefs: ["Acts 8:29", "Acts 15:28", "Rom 8:14", "Acts 16:6-7"]
  },
  "Acts 15:28": {
    verse: "For it has seemed good to the Holy Spirit and to us to lay on you no greater burden than these requirements.",
    note: "The Jerusalem Council's letter — the most remarkable phrase in all of Acts for church governance. The Spirit participates in corporate decision-making. This is not a claim to infallibility for every church decision, but it establishes that communal discernment done in the Spirit has genuine divine weight. The Spirit is present in the deliberative process of the gathered community.",
    godReveals: "God governs his church through the Spirit working in and through the gathered community's prayerful discernment. This gives corporate decision-making a dignity and gravity that individualism tends to undercut.",
    crossRefs: ["Acts 13:1-4", "Acts 8:29", "John 16:13", "1 Cor 12:4-11"]
  },
  "Rom 8:9-11": {
    verse: "You, however, are not in the flesh but in the Spirit, if in fact the Spirit of God dwells in you. Anyone who does not have the Spirit of Christ does not belong to him... If the Spirit of him who raised Jesus from the dead dwells in you, he who raised Christ Jesus from the dead will also give life to your mortal bodies through his Spirit who dwells in you.",
    note: "Paul's most compact statement of the Spirit's indwelling as the defining mark of belonging to Christ. Not spiritual gifts, not religious activity, not moral achievement — the Spirit's indwelling is the identity marker. And the Spirit who indwells you is the same Spirit who raised Jesus from the dead. Resurrection power is at work in ordinary believers.",
    godReveals: "The Spirit's presence is the beginning of resurrection — the guarantee that physical death is not the last word. Every believer carries within them the Spirit who overcame death. This is the most staggering claim in Romans 8.",
    crossRefs: ["John 3:5-8", "Ezek 36:26-27", "1 Cor 6:19-20", "Eph 1:13-14"]
  },
  "Rom 8:14-16": {
    verse: "For all who are led by the Spirit of God are sons of God. For you did not receive the spirit of slavery to fall back into fear, but you have received the Spirit of adoption as sons, by whom we cry, 'Abba! Father!'",
    note: "The Spirit produces the most intimate possible relational cry: 'Abba' — the Aramaic word for father used within the family, not the formal address of a subject to a king. The Spirit takes the facts of adoption and makes them emotionally, experientially real. This is not just legal status — the Spirit bears witness with our spirit that we are actually children.",
    godReveals: "God does not want to be feared as a master — he wants to be known as a father. The Spirit's role is to make that fatherhood felt, not just believed. The most intimate word in human language ('Abba') is what the Spirit puts in the mouths of believers.",
    crossRefs: ["Gal 4:4-7", "John 14:16-17", "Luke 11:13", "Eph 1:5"]
  },
  "Rom 8:26-27": {
    verse: "Likewise the Spirit helps us in our weakness. For we do not know what to pray for as we ought, but the Spirit himself intercedes for us with groanings too deep for words.",
    note: "One of the most pastoral statements in all of Paul's letters. The Spirit prays through us — not instead of us, but through our weakness. When we don't know how to pray, when words fail, the Spirit takes our inarticulate longing and offers it perfectly to the Father. Prayer is not a solo human act — it is Trinitarian from the inside.",
    godReveals: "God has provided for our prayer weakness by praying through us. The Spirit's intercession means no groan is wasted, no silence is empty. The inner life of the Trinity includes the Spirit interceding for the very people the Father is saving.",
    crossRefs: ["John 14:16-26", "Gal 4:6", "Heb 7:25", "Rev 22:17"]
  },
  "1 Cor 2:10-14": {
    verse: "These things God has revealed to us through the Spirit. For the Spirit searches everything, even the depths of God... we have received not the spirit of the world, but the Spirit who is from God, that we might understand the things freely given us by God.",
    note: "The Spirit as the one who makes divine knowledge accessible to human minds. Not emotionally — cognitively. The 'natural person' (psychikos — soulish, unregenerate) cannot receive the things of the Spirit because they are spiritually discerned. This is not intellectual snobbery but a statement about the noetic effects of the Spirit: he opens what was closed.",
    godReveals: "God has not left his revelation locked to human intelligence — he has given the Spirit so that ordinary people can understand extraordinary truths. The Spirit is the interpretive key to Scripture. Without him, the Bible is a closed book.",
    crossRefs: ["John 16:13", "1 Cor 12:3", "Prov 1:23", "Eph 1:17"]
  },
  "1 Cor 12:4-11": {
    verse: "There are varieties of gifts, but the same Spirit; and there are varieties of service, but the same Lord; and there are varieties of activities, but it is the same God who empowers them all in everyone. To each is given the manifestation of the Spirit for the common good.",
    note: "The Spirit distributes gifts as he determines — not as we choose or achieve. The diversity is intentional (different gifts) but the source is unified (same Spirit). The purpose is explicitly communal: for the common good. No gift is for personal spiritual status. The distribution resists all hierarchy except the sovereign choice of the Spirit himself.",
    godReveals: "God's Spirit creates a community of interdependence, not a competition of spiritual achievement. The variety of gifts is a feature, not a flaw — it requires community members to need each other.",
    crossRefs: ["Rom 12:4-8", "Eph 4:3-4", "1 Pet 4:10-11", "Acts 13:1-4"]
  },
  "Gal 5:16-25": {
    verse: "But I say, walk by the Spirit, and you will not gratify the desires of the flesh... But the fruit of the Spirit is love, joy, peace, patience, kindness, goodness, faithfulness, gentleness, self-control.",
    note: "Walk (peripateo — present imperative) is continuous, directional, daily movement. The fruit (singular — not fruits) is one integrated character, not nine separate achievements. Notice that fruit is grown, not manufactured — it is the natural output of a living thing. The Spirit produces character from the inside out; we do not produce it through effort and present it to God.",
    godReveals: "God's transformation strategy is organic, not mechanical. He plants his Spirit, and the Spirit bears fruit. This means spiritual formation is less about trying harder and more about remaining connected to the vine — John 15's metaphor precisely.",
    crossRefs: ["John 15:1-8", "Rom 8:9-11", "Eph 5:18", "2 Pet 1:3-8"]
  },
  "Eph 1:13-14": {
    verse: "In him you also, when you heard the word of truth, the gospel of your salvation, and believed in him, were sealed with the promised Holy Spirit, who is the guarantee of our inheritance until we acquire possession of it.",
    note: "Sealed (esphragisthete) — a signet ring pressed into wax, marking ownership and securing contents. The Spirit is God's seal on the believer — marking them as his own, securing them for the final day. Guarantee (arrabon) is a commercial term: down payment, earnest money — a portion of the full inheritance paid now as pledge of what is coming.",
    godReveals: "The Spirit's indwelling is simultaneously a mark of ownership and a promise of completion. God does not seal people he plans to abandon. The Spirit as guarantee means the future is not in doubt — it is paid for in advance.",
    crossRefs: ["Eph 4:30", "2 Cor 1:22", "2 Cor 5:5", "Rom 8:23"]
  },
  "Eph 4:30": {
    verse: "And do not grieve the Holy Spirit of God, by whom you were sealed for the day of redemption.",
    note: "Grieve (lypeo) — to cause pain, to sadden. The Spirit can be hurt. This is the most direct statement of the Spirit's personhood and emotional life in the NT. The context (vv.29-31) is speech: corrupting talk grieves him. Words are not neutral. The Spirit is sealed within you — he hears every conversation, experiences every relational choice.",
    godReveals: "The Spirit is personally affected by how believers live. He is not an impersonal force who registers no response — he is a person who can be saddened. This should produce reverence in daily life, not fear, but a genuine care for the one who dwells within.",
    crossRefs: ["Isa 63:10-14", "1 Thess 5:19", "Eph 1:13-14", "Heb 10:29"]
  },
  "Eph 5:18": {
    verse: "And do not get drunk with wine, for that is debauchery, but be filled with the Spirit.",
    note: "The command is continuous passive imperative — keep being filled, keep being filled. It is not a one-time experience. The contrast with drunkenness is instructive: alcohol controls from the outside in; the Spirit fills from the inside out. Both produce altered behavior — but one leads to debauchery and one leads to the Spirit-saturated community life described in vv.19-21.",
    godReveals: "God commands what he provides. The imperative to be filled carries within it the assumption that the filling is available and repeatable. This is not a static state achieved once — it is a dynamic, daily, renewable relationship.",
    crossRefs: ["Acts 2:1-4", "Gal 5:16-25", "Eph 1:13-14", "Luke 11:13"]
  },
  "2 Tim 1:7": {
    verse: "For God gave us a spirit not of fear but of power and love and self-control.",
    note: "Written from prison, to Timothy who is struggling with shame and timidity. The Spirit Paul describes is directly counter to Timothy's felt experience. Power (dynamis) — ability to do what is required. Love (agape) — the orientation toward others that makes power safe. Self-control (sophronismos) — sound judgment, disciplined mind. These three together describe a person who is both strong and safe, both bold and measured.",
    godReveals: "The Spirit's character is the antidote to fear. When anxiety or shame produces timidity in ministry, the Spirit is the direct response — not a technique, not a pep talk, but a person who provides what fear removes.",
    crossRefs: ["Acts 1:8", "Rom 8:15", "Judg 6:34", "Matt 10:20"]
  },
  "Titus 3:5-6": {
    verse: "He saved us, not because of works done by us in righteousness, but according to his own mercy, by the washing of regeneration and renewing of the Holy Spirit, whom he poured out on us richly through Jesus Christ our Savior.",
    note: "Regeneration (palingenesia — new birth/new genesis) and renewal by the Spirit — together these describe conversion. 'Poured out richly' echoes Joel 2's abundance. The Spirit is not doled out sparingly to the worthy — he is poured out generously. Salvation is not a cooperative project between human effort and divine assistance; it is entirely divine initiative.",
    godReveals: "God's salvation is entirely his own work, applied by his own Spirit. The Spirit's role in regeneration removes the possibility of human boasting. He does not assist our transformation — he initiates and sustains it.",
    crossRefs: ["John 3:5-8", "Ezek 36:26-27", "Joel 2:28-29", "Acts 2:33"]
  },
  "Heb 9:14": {
    verse: "How much more will the blood of Christ, who through the eternal Spirit offered himself without blemish to God, purify our conscience from dead works to serve the living God.",
    note: "The atonement is a Trinitarian event: the Son offers himself to the Father through the eternal Spirit. The Spirit is present not just at Pentecost but at Calvary. The 'eternal Spirit' contrasts with the annual Day of Atonement sacrifices that had to be repeated — this offering, made through the eternal Spirit, is once for all.",
    godReveals: "The cross is not a solo act of the Son — it is a Trinitarian event. The Spirit is involved in the very act of redemption, not just its application. This means every aspect of salvation — from atonement to regeneration — is Spirit-saturated.",
    crossRefs: ["Heb 10:15-16", "Rom 8:11", "John 20:22", "Eph 1:13-14"]
  },
  "Heb 10:29": {
    verse: "How much worse punishment, do you think, will be deserved by the one who has trampled underfoot the Son of God, and has profaned the blood of the covenant by which he was sanctified, and has outraged the Spirit of grace?",
    note: "The Spirit is named 'grace' — he is the personal agent through whom God's grace reaches and sanctifies us. To insult the Spirit of grace is to desecrate the very mechanism of God's mercy. The escalating logic: Moses' law brought death on two or three witnesses — how much greater the offense against the Son, the covenant blood, and the Spirit? This is a warning to those who have genuinely tasted the Spirit's work and then deliberately turned away.",
    godReveals: "Grace is not cheap. The Spirit who delivers grace is the Spirit of grace — and insulting him is the deepest possible offense against the covenant. The same Spirit who is tender is also the one whose rejection carries the gravest consequences.",
    crossRefs: ["Heb 6:4-6", "Eph 4:30", "1 Sam 16:14", "Ps 51:11"]
  },
  "Heb 12:9": {
    verse: "Besides this, we have had earthly fathers who disciplined us and we respected them. Shall we not much more be subject to the Father of spirits and live?",
    note: "'Father of spirits' — a unique title for God found nowhere else in Scripture. God fathers us at the level of our spirit, not just as our creator. The argument: if we respected earthly fathers who disciplined imperfectly, how much more should we submit to the one who disciplines as Father at our deepest level, for our true good.",
    godReveals: "God's discipline is the discipline of a Father who has an intimate claim on our innermost being. He does not discipline from a distance — he disciplines as the Father of the very spirit within us. This gives his correction both authority and intimacy.",
    crossRefs: ["Heb 12:10-11", "Prov 3:11-12", "Rev 3:19", "Rom 8:14-16"]
  },
  "Jas 4:5-6": {
    verse: "Or do you suppose it is to no purpose that the Scripture says, 'He yearns jealously over the spirit he has made to dwell in us'? But he gives more grace.",
    note: "God jealously longs for the spirit he caused to dwell in us. This is the most emotionally vivid Spirit-verse in the NT. The surrounding context is spiritual adultery — friendship with the world as betrayal of God. The jealousy is covenantal: a faithful spouse who has given everything and rightly expects fidelity. And then immediately: but he gives more grace. His jealousy drives him toward us with more provision, not away from us with abandonment.",
    godReveals: "God has emotionally invested himself in us through the Spirit. His jealousy is the jealousy of love, not wounded pride — and it escalates to greater grace rather than withdrawal. This is the most tender picture of God's relationship to the indwelling Spirit in all of Scripture.",
    crossRefs: ["Eph 4:30", "Isa 63:10-14", "1 Cor 6:19-20", "Rom 8:26-27"]
  },
  "2 Pet 1:21": {
    verse: "For no prophecy was ever produced by the will of man, but men spoke from God as they were carried along by the Holy Spirit.",
    note: "The Greek (pheromenoi) — carried along, borne as a ship is carried by the wind. Not dictated past the human authors, not merely assisted — the Spirit carried them, the way wind fills a sail. The human author's personality, style, and vocabulary remain fully engaged; but the Spirit is the wind that fills and drives. This is the NT's most concise statement of verbal inspiration.",
    godReveals: "Scripture's authority rests on the Spirit who carried its human authors. The Bible is not a human book about God — it is the Spirit-carried word of God through human instruments. This gives Scripture its unique claim on believers' lives.",
    crossRefs: ["2 Sam 23:1-2", "Mark 12:36", "1 Cor 2:10-14", "2 Tim 3:16"]
  },
  "Rev 2-3": {
    verse: "He who has an ear, let him hear what the Spirit says to the churches.",
    note: "Seven times — once to each church — the risen Christ concludes with this identical formula. The Spirit speaks to churches in their specific conditions: commending, warning, rebuking, encouraging. This is the Spirit in his ongoing role as the voice of the risen Christ to his gathered people. He speaks diagnostically, with precision, and with urgency.",
    godReveals: "The Spirit addresses the church as she actually is, not as she imagines herself to be. His prophetic word to the churches includes both affirmation and exposure. He is willing to name what the church would prefer to leave unexamined.",
    crossRefs: ["Heb 3:7-11", "Acts 15:28", "John 16:7-15", "Isa 63:10-14"]
  },
  "Mic 3:8": {
    verse: "But as for me, I am filled with power, with the Spirit of the LORD, and with justice and might, to declare to Jacob his transgression and to Israel his sin.",
    note: "Micah's self-portrait as a Spirit-empowered prophet stands in deliberate contrast to the false prophets in 3:5-7 who prophesy for money and speak peace when their mouths are fed. The Spirit's empowerment is for courage to speak what no one wants to hear — not for popularity or spiritual status. The Spirit fills Micah with three things together: power, justice, and might. They are inseparable.",
    godReveals: "The Spirit equips people to speak the truth that costs something. This is one of the clearest OT pictures of the Spirit empowering against the grain of cultural and religious pressure — the Spirit as the source of costly prophetic courage.",
    crossRefs: ["2 Chr 24:20", "Judg 6:34", "Acts 4:8", "2 Tim 1:7"]
  },
  "Hag 2:5": {
    verse: "According to the covenant that I made with you when you came out of Egypt, my Spirit remains in your midst. Fear not.",
    note: "Haggai delivers this word to a discouraged community rebuilding the temple — a shadow of Solomon's glory. The Spirit's presence is grounded not in the greatness of the project but in the covenant made at the Exodus. 'My Spirit remains' — present tense, continuous, uninterrupted by the exile. The command 'fear not' flows directly from the Spirit's presence. Courage is not generated; it is derived.",
    godReveals: "The Spirit's presence is covenantally grounded, not circumstantially dependent. He does not leave when the circumstances are discouraging or the results are underwhelming. This is the foundation of all Spirit-empowered persistence.",
    crossRefs: ["Neh 9:20", "Ezek 36:26-27", "Isa 59:21", "Acts 9:31"]
  },
  "Zech 4:6": {
    verse: "Then he said to me, 'This is the word of the LORD to Zerubbabel: Not by might, nor by power, but by my Spirit, says the LORD of hosts.'",
    note: "Zerubbabel faces the overwhelming task of rebuilding the temple with limited resources and a small, discouraged remnant. The word of the Lord cuts through every calculation of human adequacy: not might (military strength), not power (human capacity) — but my Spirit. This is not a passive statement; it is a reorientation of the entire framework for how God's work gets done.",
    godReveals: "God's work is accomplished through a means that defies human accounting. The Spirit is the explanation for every instance of God's purposes advancing despite inadequate human resources. This verse is the theological ground of every Spirit-empowered ministry that looks too small to matter.",
    crossRefs: ["Judg 7", "2 Cor 12:9", "Acts 4:31", "1 Cor 2:4-5"]
  },
  "Zech 12:10": {
    verse: "And I will pour out on the house of David and the inhabitants of Jerusalem a spirit of grace and pleas for mercy, so that, when they look on me, on him whom they have pierced, they will mourn for him, as one mourns for an only child.",
    note: "A Messianic prophecy quoted in John 19:37 at the crucifixion. The Spirit here is named 'grace and supplication' — he is the agent of both the grace that enables repentance and the mourning that accompanies genuine recognition of what sin costs. The Spirit produces the very sorrow that leads to salvation. John quotes this as fulfilled when the soldier pierces Jesus' side.",
    godReveals: "The Spirit is the agent of genuine repentance. He pours out grace and produces the mourning that drives people to God. Repentance is not a human achievement — it is a Spirit-produced gift. This connects to the NT's conviction that no one comes to the Father unless the Spirit draws them.",
    crossRefs: ["John 19:37", "Acts 2:37-38", "Joel 2:28-29", "John 16:7-15"]
  },
  "1 Pet 4:14": {
    verse: "If you are insulted for the name of Christ, you are blessed, because the Spirit of glory and of God rests upon you.",
    note: "Peter calls the Spirit 'the Spirit of glory' — a title found nowhere else in the NT. When believers suffer insult and rejection for the name of Christ, the Spirit of glory rests on them. This is not a consolation prize — it is the actual presence of God's glory inhabiting the very moment of suffering. The Spirit honors those who are dishonored for Christ's sake, bestowing what the world removes.",
    godReveals: "The Spirit's presence intensifies in suffering for Christ's name. God does not abandon his people to their dishonor — he sends his Spirit of glory to rest specifically on those the world is trying to shame. This reframes persecution entirely: the place of insult becomes the place of glory.",
    crossRefs: ["Matt 5:11-12", "Rom 8:17", "2 Cor 12:9-10", "Acts 5:41"]
  },
  "Eph 1:17": {
    verse: "That the God of our Lord Jesus Christ, the Father of glory, may give you the Spirit of wisdom and of revelation in the knowledge of him.",
    note: "Paul prays for the Spirit of wisdom and revelation — not just information about God but genuine knowledge of him. The Spirit here is the personal agent of all true spiritual perception. Without the Spirit, even correct theological information produces what the group notes called 'the spiritual life of foolishness' — knowing about God without knowing God. This is why the Spirit and the Word must always work together.",
    godReveals: "God desires to be genuinely known, not merely described. The Spirit of wisdom and revelation is the means by which head knowledge becomes heart knowledge. This is why prayer for the Spirit's illumination must precede and accompany all Bible study.",
    crossRefs: ["1 Cor 2:10-14", "John 16:13", "Col 1:9-10", "Ps 143:10"]
  },
  "Rom 7:6": {
    verse: "But now we are released from the law, having died to that which held us captive, so that we serve in the new way of the Spirit and not in the old way of the written code.",
    note: "The contrast Paul draws is not law vs. no law — it is the old way of external code vs. the new way of internal Spirit. The law revealed the problem but could not supply the solution. The Spirit does not abolish the law's righteous standard — he fulfills it from within (as Ezek 36:27 promised: 'I will cause you to walk in my statutes'). The new covenant is a Spirit-powered relationship, not a better rulebook.",
    godReveals: "God's ultimate goal was never mere behavioral compliance — it was genuine relational obedience flowing from a transformed inner life. The Spirit is the means by which the law's righteous requirement is actually met in us, not bypassed.",
    crossRefs: ["Ezek 36:26-27", "Rom 8:4", "Gal 5:16-25", "2 Cor 3:6"]
  },
  "2 Cor 3:17-18": {
    verse: "Now the Lord is the Spirit, and where the Spirit of the Lord is, there is freedom. And we all, with unveiled face, beholding the glory of the Lord, are being transformed into the same image from one degree of glory to another. For this comes from the Lord who is the Spirit.",
    note: "One of Paul's most compressed Trinitarian and pneumatological statements. 'The Lord is the Spirit' — Paul is identifying the Spirit's ministry as the continuation of the Lord's presence, as the Spirit makes Christ present to believers. The unveiled face contrasts with Moses' veil — the old covenant had a mediated, veiled glory; the new covenant has direct, Spirit-enabled beholding of Christ's glory. Transformation is progressive ('from glory to glory') and passive ('being transformed') — it happens to us as we behold, not through our striving.",
    godReveals: "The Spirit's transformation strategy is exposure, not effort. As we behold Christ through the Spirit's illumination of Scripture and prayer, we are changed into what we behold. This is profoundly liberating — it shifts the locus of spiritual growth from our striving to the Spirit's work in us as we attend to him.",
    crossRefs: ["Rom 8:29", "Gal 5:16-25", "John 16:14", "Eph 3:16-19"]
  },
  "Zech 6:8": {
    verse: "Then he called to me, 'Look, those going toward the north country have given my Spirit rest in the north country.'",
    note: "A cryptic but significant verse — the Spirit of the LORD declares satisfaction or completion over the north, historically the direction of Israel's greatest threat (Babylon, Assyria). The Spirit's 'rest' here echoes the rest of God after creation (Gen 2) and the Sabbath principle — a declaration that what was to be done has been accomplished. The Spirit is not restless or anxious. He works to completion and then rests. It's a striking image of divine sovereignty over geopolitical history — the Spirit of God quietly governing what empires assume they control.",
    godReveals: "God's Spirit is not merely present in worship or in individuals — he governs history. The 'rest' of the Spirit over a conquered territory is a declaration that God's purposes have been fulfilled there. Nothing happens outside his oversight.",
    crossRefs: ["Zech 4:6", "Gen 2:2-3", "Isa 11:2", "Rev 4:2"]
  },
  "Acts 16:6-7": {
    verse: "And they went through the region of Phrygia and Galatia, having been forbidden by the Holy Spirit to speak the word in Asia. And when they had come up to Mysia, they attempted to go into Bithynia, but the Spirit of Jesus did not allow them.",
    note: "Two closed doors in a row — the Holy Spirit, then 'the Spirit of Jesus' (a unique phrase in the NT). Paul's missionary movement is being redirected without explanation in the text. The vision of the Macedonian man follows immediately. The Spirit's guidance here is entirely negative — not 'go here' but 'not there, not there' — until the positive direction becomes clear. This is one of the most practically challenging Spirit passages: it normalizes the experience of being blocked from what seems like good and faithful work, without immediate explanation.",
    godReveals: "God's guidance often comes through closed doors before open ones. The Spirit redirecting Paul was not a failure of faith or planning — it was the Spirit actively governing the mission. He is as present in the 'no' as in the 'yes.'",
    crossRefs: ["Acts 13:1-4", "Acts 15:28", "Acts 16:9-10", "Rom 8:14"]
  },
  "Rom 5:5": {
    verse: "And hope does not put us to shame, because God's love has been poured into our hearts through the Holy Spirit who has been given to us.",
    note: "The Spirit is here the means of experiential love — not theological information about love, but love actually felt and known. 'Poured' (ekcheo) is the same word used of Pentecost in Acts 2. The Spirit doesn't trickle in; he floods. The context is suffering producing hope (Rom 5:3-4), and the Spirit is what keeps hope from being wishful thinking — he makes it felt as real. This is the group's question answered: how do we move from intellectual belief to felt assurance? The Spirit pours love into the heart. It is his work, not ours to manufacture.",
    godReveals: "God does not intend his love to remain a theological category — he sends his Spirit to make it felt. The Spirit is the experiential bridge between what is true about God and what we actually experience of him.",
    crossRefs: ["Rom 8:14-16", "Gal 4:6", "Acts 2:17-18", "1 Jn 4:13"]
  },
  "1 Cor 3:16": {
    verse: "Do you not know that you are God's temple and that God's Spirit dwells in you?",
    note: "The 'you' here is plural — Paul is addressing the Corinthian church as a corporate body, not just individuals. The temple imagery is loaded: Israel's entire sacrificial and worship system was organized around the presence of God in the temple. Paul is saying that the church, gathered together, is now that temple. The Spirit's indwelling is not only personal (1 Cor 6:19) but corporate — the congregation together constitutes a space where God's Spirit dwells. The immediate context is church division and factionalism, which is why v.17 warns that those who destroy God's temple will themselves be destroyed. Disunity is a desecration.",
    godReveals: "God intends to be present in a gathered community, not just in isolated individuals. The church's unity is not primarily a social nicety — it is the integrity of the temple of the Holy Spirit.",
    crossRefs: ["1 Cor 6:19-20", "Eph 2:19-22", "Eph 4:30", "1 Cor 12:4-11"]
  },
  "Gal 4:6": {
    verse: "And because you are sons, God has sent the Spirit of his Son into our hearts, crying, 'Abba! Father!'",
    note: "The sequence matters: adoption comes first (v.5), and then the Spirit is sent as confirmation of it. The Spirit does not produce the relationship — he confirms and makes it felt. 'Abba' was Jesus's own word for the Father (Mark 14:36), and Paul's extraordinary claim is that the Spirit cries this same word from within us — which means the Spirit's prayer life is the Son's prayer life, shared with and through those who belong to him. This is Paul's answer to 'how do I know I belong to God?' — you know by the Spirit within you reaching toward the Father with the language of a child who is certain of their welcome.",
    godReveals: "God sends the Spirit not to establish the relationship but to confirm it — to make sonship felt and known from the inside. The Spirit's cry of Abba is God assuring his children of what is already true.",
    crossRefs: ["Rom 8:14-16", "Rom 5:5", "Mark 14:36", "1 Jn 3:24"]
  },
  "2 Cor 1:21-22": {
    verse: "And it is God who establishes us with you in Christ, and has anointed us, and who has also put his seal on us and given us his Spirit in our hearts as a guarantee.",
    note: "Three overlapping images in two verses: anointing (commissioning for royal or prophetic service, as in 1 Sam 16), sealing (ownership and security — a seal on a letter or a deed), and guarantee (arrabon — a down payment, the first installment of something larger coming). All three are actions of God, not of the believer. The Spirit is given as arrabon — a commercial and legal term for an advance payment that obligates the giver to complete the transaction. The Spirit himself is not just a sign of future inheritance; he is the first portion of it. What we experience of the Spirit now is a foretaste, not a symbol.",
    godReveals: "The Spirit is not merely a sign that heaven is coming — he is heaven's first installment. God has legally committed himself to completion by giving the Spirit now. The guarantee is as certain as a signed contract.",
    crossRefs: ["Eph 1:13-14", "2 Cor 5:5", "Rom 8:23", "1 Cor 3:16"]
  },
  "Rev 22:17": {
    verse: "The Spirit and the Bride say, 'Come.' And let the one who hears say, 'Come.' And let the one who is thirsty come; let the one who desires take the water of life without price.",
    note: "The final word of the Spirit in Scripture is an invitation. The Spirit and the church together cry Come — echoing John 7:37-38's rivers of living water. The Spirit who hovered over chaos in Genesis 1:2 now joins the Bride at the end of history in a single pleading word. The Spirit's last act is not judgment or closure — it is welcome.",
    godReveals: "The Spirit begins Scripture by hovering over formless void and ends it by issuing the final invitation to come. His trajectory is entirely oriented toward the inclusion of the thirsty. The Spirit's eschatological word is not warning — it is Come.",
    crossRefs: ["Gen 1:2", "John 7:37-39", "Isa 55:1", "Matt 11:28"]
  },
  "1 Jn 3:24": {
    verse: "Whoever keeps his commandments abides in God, and God in him. And by this we know that he abides in us, by the Spirit whom he has given us.",
    note: "John's letter repeatedly circles three markers of genuine faith: keeping commandments, love for one another, and the Spirit. Here he binds two together — obedience as the ground of mutual abiding, and the Spirit as the assurance of it. The Spirit is not given primarily as an emotional experience but as a gift whose presence confirms that the abiding is real. The group's instinct was right: the Spirit confirms what is already true, he does not create the experience independently of it.",
    godReveals: "God wants his people to have assurance of their standing with him — not anxious uncertainty. The Spirit is his means of providing that assurance. He does not leave his people wondering whether they are truly his.",
    crossRefs: ["Rom 8:16", "1 Jn 4:13", "Gal 4:6", "John 14:16-26"]
  },
  "1 Jn 4:1-6": {
    verse: "Beloved, do not believe every spirit, but test the spirits to see whether they are from God, because many false prophets have gone out into the world.",
    note: "John commands discernment as an active practice — test (dokimazete) is the same word Paul uses in 1 Thess 5:21. The criterion given is Christological: does the spirit confess that Jesus Christ has come in the flesh? In John's context, proto-Gnostic teachers denied the incarnation. The principle extends: the Spirit always points to and confirms the real, physical, historical Jesus. Any spirit that abstracts Christ away from his incarnate humanity is not the Spirit of God. The group's observation stands: discernment is a skill to be developed, not a passive experience — and it is commanded, not optional.",
    godReveals: "The Spirit never leads away from the historical, incarnate Jesus. He is always Christologically anchored. This gives the church a criterion for evaluating spiritual claims that is both theological and practical — does it lead toward the real Christ, or away from him?",
    crossRefs: ["1 Cor 12:3", "2 Jn 7", "Deut 13:1-5", "Matt 7:15-20"]
  },
  "1 Jn 4:13": {
    verse: "By this we know that we abide in him and he in us, because he has given us of his Spirit.",
    note: "John uses 'of his Spirit' (ek tou pneumatos) — a portion given, a participation — which connects to John's Gospel language of the Spirit being poured out without measure on Jesus (Jn 3:34). The Spirit who dwells in the believer is not a secondary gift but the actual presence of God. This is John's ground for assurance: not feelings, not performance, but the presence of the Spirit himself. The group asked: how do our hearts and minds relate in approaching God? John's answer — the Spirit, given and present — precedes both.",
    godReveals: "God's indwelling is not a theological abstraction — it is confirmed by the Spirit's actual presence. The Spirit is God's assurance to his people that the relationship is real and the union is genuine.",
    crossRefs: ["1 Jn 3:24", "Rom 8:16", "John 3:34", "Eph 1:13-14"]
  },
  "1 Jn 5:6-8": {
    verse: "This is he who came by water and blood — Jesus Christ; not by the water only but by the water and the blood. And the Spirit is the one who testifies, because the Spirit is the truth. For there are three that testify: the Spirit and the water and the blood; and these three agree.",
    note: "Three witnesses to the identity of Jesus: the Spirit (ongoing testimony in the church), water (baptism, or the water at the cross), and blood (the death of Jesus). The Spirit's role is explicitly to testify — he is always a witness to Christ, not to himself. 'The Spirit is the truth' echoes Jesus: the Spirit of truth (John 14-16). The ambiguity about water may be intentional — across Scripture water carries judgement, cleansing, and new life simultaneously. The group asked the right question. These questions are worth sitting with rather than resolving too quickly.",
    godReveals: "The Spirit's testimony about Jesus is truth itself — not merely an impression or a feeling. He bears witness to the historical, specific claims about Jesus Christ, grounding spiritual experience in historical reality.",
    crossRefs: ["John 14:17", "John 15:26", "John 19:34-35", "Rev 22:17"]
  },
  "Rev 1:10": {
    verse: "I was in the Spirit on the Lord's Day, and I heard behind me a loud voice like a trumpet.",

  title: "Guiding Principles",
  icon: "I",
  content: [{
    type: "quote",
    text: "It is good to want to understand, but the Holy Spirit is mysterious and will remain somewhat undefined. There is more responsibility to follow the Spirit than to define him."
  }, {
    type: "quote",
    text: "The transformative is always miraculous, but the miraculous is not always transformative."
  }, {
    type: "body",
    text: "These two principles govern the whole study. We pursue understanding not to domesticate the Spirit but to follow him more faithfully. And we resist the temptation to equate dramatic supernatural experiences with genuine spiritual depth — they are not the same thing."
  }]
}, {
  id: "ot-function",
  title: "The Spirit in the OT — Function & Pattern",
  icon: "II",
  content: [{
    type: "body",
    text: "The Spirit operates in four broad OT categories: creation of the world; redemption and formation of the people of God; divine empowerment of leadership (king, prophet, judge, craftsman); and the ethics of the people of God."
  }, {
    type: "body",
    text: "The specific term 'Holy Spirit' appears only three times in the OT (Ps 51:11; Isa 63:10,11). Total Spirit references are approximately 73, including 'Spirit of God' (14x) and 'Spirit of the Lord' (26x)."
  }, {
    type: "subhead",
    text: "Judges vs. Joseph and Daniel"
  }, {
    type: "body",
    text: "The Judges (Samson, Gideon, Jephthah) were passive, reactive, lacking character — yet the Spirit came upon them for deliverance. Joseph and Daniel, by contrast, had deep integrity and were given supernatural wisdom. The Spirit works through both character and its absence — but character and Spirit together produce something richer and more sustained."
  }]
}, {
  id: "shift",
  title: "The OT-to-NT Shift",
  icon: "III",
  content: [{
    type: "body",
    text: "By the time of Jesus, many Jews believed prophetic activity had largely ceased after the exile. 1 Maccabees laments a time 'since prophets ceased to appear.' The rabbinic tradition held that after Haggai, Zechariah, and Malachi, only a bat qol (heavenly voice) remained."
  }, {
    type: "body",
    text: "Joel, Isaiah, and Ezekiel had created an expectation of a coming outpouring on all flesh. When John the Baptist announced Spirit-baptism and Jesus read Isaiah 61 at Nazareth, they were landing in that expectation and claiming its fulfillment."
  }, {
    type: "subhead",
    text: "What Changed at Pentecost"
  }, {
    type: "body",
    text: "Mode: comes upon — dwells within. Scope: selective — universal. Duration: temporary, can depart — permanent, sealed until redemption. Battlefield: physical war — spiritual warfare. Status: anticipation — fulfillment. Everything changes, but the Spirit himself is the same."
  }]
}, {
  id: "false-doctrine",
  title: "Correcting False Doctrine",
  icon: "IV",
  content: [{
    type: "subhead",
    text: "Prosperity Theology"
  }, {
    type: "body",
    text: "The Spirit took Jesus into the wilderness immediately after his baptism — not into ease and blessing. He led Israel through the sea into the desert as a trial to purify them. Israel failed the test (1 Cor 10). Don't assume a subconscious theology of prosperity. The Spirit often takes us into places of challenge and trial."
  }, {
    type: "subhead",
    text: "Emotional Over-Attribution"
  }, {
    type: "body",
    text: "'I feel like the Spirit is telling me to do this' conflates emotion with direction. More reliable markers: the fruit of the Spirit growing quietly over time, conviction leading to repentance, counterintuitive peace, unexpected compassion for difficult people."
  }, {
    type: "subhead",
    text: "Multiple Baptisms"
  }, {
    type: "body",
    text: "The normative NT teaching is one Lord, one faith, one baptism (Eph 4). Exceptional cases in Acts exist to teach the disciples something about inclusion — they are not the pattern for every believer's experience. Don't make the exception the norm."
  }]
}, {
  id: "theology",
  title: "What the Spirit Reveals About God",
  icon: "V",
  content: [{
    type: "body",
    text: "Across every passage, the Spirit emerges as the personal presence of God within the covenant relationship — the one who sanctifies, connects us to the Father's fatherhood, joins us to the heavenly assembly, animates genuine faith, and is longed over by a God who put him in us and wants us back (James 4:5)."
  }, {
    type: "quote",
    text: "God is not distant or indifferent. The Spirit is his nearness — and that nearness carries both gravity and tenderness."
  }, {
    type: "subhead",
    text: "Roles and Responsibilities"
  }, {
    type: "body",
    text: "On the receiving end: you are not responsible for manufacturing a feeling — only for trusting the person of God. On the giving end: you are not responsible for persuading anyone through charisma or wit — the Spirit does the convincing (1 Cor 2:4-5). Both sides of that equation are profoundly liberating."
  }, {
    type: "subhead",
    text: "The Hierarchy of Spiritual Beings"
  }, {
    type: "body",
    text: "All humans have a spirit — created in the image of God as spiritual beings with conscience and will. The biblical hierarchy: Trinity, angels, demons and unclean spirits, humanity. Every Spirit encounter exists within this framework, grounding us against both over-spiritualizing and under-spiritualizing our experience."
  }]
}, {
  id: "personhood",
  title: "The Spirit is a Person, Not a Force",
  icon: "VI",
  content: [{
    type: "quote",
    text: "The Spirit is a person, not a force. He relates to you as a person."
  }, {
    type: "body",
    text: "This one-sentence corrective from your 2020 personal study notes addresses the most common functional misunderstanding of the Spirit. When we think of the Spirit as a force — like electricity or gravity — we naturally ask: 'How do I access more of it?' When we understand him as a person, the question becomes: 'How do I relate to him better?' The difference in posture is enormous."
  }, {
    type: "subhead",
    text: "He Can Be Grieved, Quenched, Lied To, Resisted"
  }, {
    type: "body",
    text: "Scripture consistently uses relational language for the Spirit's responses: he can be grieved (Eph 4:30), quenched (1 Thess 5:19), lied to (Acts 5:3), and resisted (Acts 7:51). None of these are possible if the Spirit is merely a force. They are only possible if the Spirit is a person with genuine relational presence who is personally affected by how we live."
  }, {
    type: "subhead",
    text: "He Speaks, Directs, Intercedes"
  }, {
    type: "body",
    text: "The Spirit speaks to Philip (Acts 8:29), directs the Jerusalem Council (Acts 15:28), intercedes with wordless groans (Rom 8:26), and testifies about Christ (John 15:26). These are not the actions of a force — they are the actions of a person with intelligence, will, and relational intentionality. Relating to the Spirit as a person is not optional mysticism; it is basic theological accuracy."
  }]
}, {
  id: "grandnarrative",
  title: "The Spirit as the Engine of God's Story",
  icon: "VII",
  content: [{
    type: "quote",
    text: "The Spirit is the freight engine pulling the story through history. The needle pulling God's thread through time."
  }, {
    type: "body",
    text: "This metaphor from your group's notes captures something that systematic theology often misses: the Spirit is not a theological topic among others — he is the animating force of the entire biblical narrative from Genesis 1 to Revelation 22. The Spirit hovers over chaos at the beginning. The Spirit joins the Bride in the final invitation at the end. Everything in between is Spirit-carried."
  }, {
    type: "subhead",
    text: "Grand Narrative: Creation → New Creation"
  }, {
    type: "body",
    text: "Your group identified the overarching arc: the Spirit's work is about the restoration of creation through re-creation. Genesis 1 (Spirit over chaos) → Ezekiel 37 (Spirit breathing life into dead bones) → Pentecost (Spirit poured on all flesh) → Revelation 22 (Spirit and Bride say Come). The Spirit is not reactive — he is proactively pulling the story toward its God-intended end."
  }, {
    type: "subhead",
    text: "OT Writers Attributed the Unexplainable to God's Sovereignty"
  }, {
    type: "body",
    text: "A key hermeneutical insight from your leaders' notes: OT writers often attributed things to the Spirit that we might explain differently today. This is not a problem to be solved but a posture to be learned — recognizing that God's action in history defies our categories, and resisting the urge to over-explain what Scripture is content to leave mysterious."
  }]
}, {
  id: "background",
  title: "What Is My Default Lens?",
  icon: "VIII",
  content: [{
    type: "quote",
    text: "What's my background? That's going to be my default. I may need help unlearning or changing my belief."
  }, {
    type: "body",
    text: "Christopher Wright's observation from your leaders' PDF is one of the most practically important starting points for any Spirit study. Every person in your group came in with a pre-formed framework for the Spirit — from their upbringing, church tradition, or personal experience. That framework will act as a filter on everything they read and discuss."
  }, {
    type: "subhead",
    text: "The Two Extremes"
  }, {
    type: "body",
    text: "God in a box (purely doctrinal, cessationist, intellectually controlled, emotionally flat) ←→ Sensational, emotional, uninformed, unrestrained (every feeling attributed to the Spirit, no testing, no grounding in Scripture). Both extremes are dangerous. Both are common. The study's goal is to hold the tension between genuine knowledge and genuine submission."
  }, {
    type: "subhead",
    text: "Questions to Examine Your Own Lens"
  }, {
    type: "body",
    text: "Do I assign my desires to God in order to do what I want? How do I make decisions — 'God is telling me' vs. 'I think God wants me to'? Am I a cessationist by default? Am I charismatic by default? What triggers do I have around Spirit language? How did I arrive at my conclusions? These questions are not meant to destabilize — they are meant to make our pre-existing assumptions visible so they can be examined in light of Scripture."
  }, {
    type: "subhead",
    text: "Unlearning Principles"
  }, {
    type: "body",
    text: "The group identified several things worth unlearning: 'Casper the friendly ghost' — an impersonal, harmless, vaguely comforting presence. The purely doctrinal box — information and doctrine without surrender. The assumption that my experience is the norm for everyone. The idea that the Spirit's work should always feel a certain way. Unlearning is harder than learning, but it is necessary for genuine formation."
  }]
}, {
  id: "honesty",
  title: "Honesty Check: The Uncomfortable Questions",
  icon: "IX",
  content: [{
    type: "quote",
    text: "Sad news: I have the Spirit but no transformation. Big question: Am I becoming more like Jesus?"
  }, {
    type: "body",
    text: "Your group's notes don't flinch from the hardest pastoral question: it is possible to be theologically correct about the Spirit while showing no evidence of his transforming work. This is not a question about salvation — it is a question about formation. The Spirit's indwelling is certain for every believer; the Spirit's transformation is the fruit that is supposed to follow."
  }, {
    type: "subhead",
    text: "What Can I Control and What Can't I?"
  }, {
    type: "body",
    text: "The Spirit is sovereign — you cannot manufacture his movement. But you can position yourself in the path of his work: through the Word, prayer, community, obedience, and honest self-examination. The group noted that obedience and the Spirit are intertwined and mutually reinforcing — as you choose obedience, the Spirit strengthens; as the Spirit strengthens, obedience becomes more possible."
  }, {
    type: "subhead",
    text: "Individual Sin Has Communal Consequences"
  }, {
    type: "body",
    text: "Romans 8:12-17 was flagged in your group notes with a specific application: this is not just personal — it is a church dynamic. Fighting individualistic sin requires the one-anothering of community. The question 'Am I becoming more like Jesus?' is not just a private accountability question — it is a community formation question. How can we facilitate the relationships that make this possible?"
  }, {
    type: "subhead",
    text: "The Ananias and Sapphira Test"
  }, {
    type: "body",
    text: "Your group applied Acts 5 with sharp contemporary relevance: how does Ananias and Sapphira's deception show up today? The humblebrag. The performed authenticity. The 'look how messy I am' post. The spiritual achievement projection on social media. The Spirit who struck Ananias dead for lying is the same Spirit who grieves when we perform spirituality for an audience. Don't lie to look humble. Don't lie to look holy. Don't lie."
  }]
