// ── Verse Deep Dive data ─────────────────────────────────────────
const DEEP = {
  "Gen 1:2": {
    verse: "The earth was without form and void, and darkness was over the face of the deep. And the Spirit of God was hovering over the face of the waters.",
    note: "The very first mention of the Spirit in Scripture. Before a single word of creation is spoken, the Spirit is already present — hovering, brooding, ready. The Hebrew (merachefet) is the same word used for an eagle hovering over its nest: active, protective, attentive presence over chaos.",
    godReveals: "God does not create at a distance. The Spirit is his nearness — present over formlessness before anything exists. Creation is an act of intimate involvement, not remote command.",
    crossRefs: ["Gen 2:7", "Ezek 37", "John 20:22", "Titus 3:5-6"]
  },
  "Gen 2:7": {
    verse: "Then the LORD God formed the man of dust from the ground and breathed into his nostrils the breath of life, and the man became a living creature.",
    note: "God does not just construct a human — he breathes himself into the creature. Life is not merely biological; it is derived from God's own breath. This is why Job 33:4 says 'the breath of Shaddai gives me life.' The NT's indwelling Spirit is a second, deeper breath — new creation life in the same pattern.",
    godReveals: "Every human being carries something of God's own breath. Human life is not self-originated. This is the theological ground of human dignity — and the reason the Spirit's indwelling in believers is such an intimate act.",
    crossRefs: ["Job 33:4", "Ezek 37", "John 20:22", "Gen 1:2"]
  },
  "Gen 41": {
    verse: "Pharaoh said to his servants, 'Can we find a man like this, in whom is the Spirit of God?' So Pharaoh said to Joseph, 'Since God has shown you all this, there is none so discerning and wise as you are.'",
    note: "Joseph is the rare OT figure who combines deep personal integrity with Spirit-given wisdom. The Judges received the Spirit despite their flaws. Joseph received it alongside character. Spirit and integrity together produce something qualitatively different — sustained wisdom, not just momentary power.",

    crossRefs: ["Num 11:16-29", "Isa 11:1-3", "1 Cor 12:4-11", "2 Tim 1:7"]
  },
  "Exod 31:1-5": {
    verse: "The LORD said to Moses, 'I have filled Bezalel with the Spirit of God, with ability and intelligence, with knowledge and all craftsmanship, to devise artistic designs, to work in gold, silver, and bronze...'",
    note: "The first person in Scripture explicitly said to be filled with the Spirit is not a prophet or king — it is an artist and builder. Just as the Spirit hovered over formless earth in Genesis 1, here he fills a craftsman to make the earth a dwelling place for God. No domain of human skill is outside his purview.",
    godReveals: "God cares about beauty, craft, and excellence. The Spirit of creation is also the Spirit of art. This invites every believer to see their vocational work as potentially Spirit-empowered, not just their 'ministry.'",
    crossRefs: ["Gen 1:2", "1 Cor 12:4-11", "Eph 2:21-22"]
  },
  "Num 11:16-29": {
    verse: "Moses said, 'Are you jealous for my sake? Would that all the LORD's people were prophets, that the LORD would put his Spirit on them!'",
    note: "Moses' prayer is the longing of the entire OT — and it is answered at Pentecost. Eldad and Medad receiving the Spirit without being 'official' foreshadows the sovereign unpredictability of Acts 10 (Gentiles receiving the Spirit unexpectedly). The Spirit cannot be institutionally contained.",
    godReveals: "God's ultimate intention was always universal Spirit-distribution. The OT's selectivity was provisional, not final. Moses' prayer is the seed of Joel 2.",
    crossRefs: ["Joel 2:28-29", "Acts 2:1-4", "Acts 10:44-48", "John 7:37-39"]
  },
  "Num 27:18": {
    verse: "The LORD said to Moses, 'Take Joshua the son of Nun, a man in whom is the Spirit, and lay your hand on him.'",
    note: "Leadership succession in Israel is Spirit-succession. Joshua is not chosen for strategic ability or military record — he is chosen because the Spirit is in him. This pattern runs through all OT leadership: the Spirit must be present for God-ordained authority.",
    godReveals: "Legitimate spiritual authority is Spirit-identified, not self-appointed or institutionally manufactured. God marks his leaders from the inside.",
    crossRefs: ["Deut 34:9", "1 Sam 16:13", "Isa 11:1-3", "Acts 13:1-4"]
  },
  "Deut 34:9": {
    verse: "And Joshua the son of Nun was full of the spirit of wisdom, for Moses had laid his hands on him. So the people of Israel obeyed him and did as the LORD had commanded Moses.",
    note: "The Spirit of wisdom — the same phrase Isaiah uses for the Messiah (Isa 11:2). Laying on of hands is an act of both blessing and transfer, Spirit-mediated. The result is not just Joshua's spiritual equipping but the community's willing obedience to Spirit-endowed leadership.",
    godReveals: "The Spirit creates followership as well as leadership. When the Spirit genuinely rests on a leader, it produces a community response that external authority alone cannot generate.",
    crossRefs: ["Num 27:18", "Isa 11:1-3", "Acts 6:3", "1 Tim 4:14"]
  },
  "Judg 3:10": {
    verse: "The Spirit of the LORD was upon him, and he judged Israel. He went out to war, and the LORD gave Cushan-rishathaim king of Mesopotamia into his hand.",
    note: "Othniel is the first judge — and arguably the cleanest. Israel has followed Baal and suffered oppression. The Spirit comes on a passive people's passive leader, and deliverance follows. This establishes the OT pattern: Spirit-empowerment interrupts cycles of disobedience and restores what was lost.",
    godReveals: "God's grace is not contingent on the worthiness of those he saves through. The Spirit comes to deliver his people even when they have chased other gods. Rescue precedes repentance in the Judges cycle.",
    crossRefs: ["Judg 6:34", "Judg 13:25", "1 Sam 10:6", "Acts 3:19"]
  },
  "Judg 6:34": {
    verse: "But the Spirit of the LORD clothed Gideon, and he sounded the trumpet, and the Abiezrites were called out to follow him.",
    note: "'Clothed' — one of the most vivid Spirit-metaphors in the OT. Gideon is defined by fear (he's hiding in a winepress when God calls him). The Spirit doesn't wait for Gideon's courage — he clothes him with it. This is the Spirit working from the outside in, equipping what is not naturally there.",
    godReveals: "God does not require courage before sending the Spirit — he sends the Spirit to produce the courage. This reframes every calling that feels too large: the Spirit is the equipment, not the reward for prior bravery.",

  },
  "Judg 13:25": {
    verse: "And the Spirit of the LORD began to stir him in Mahaneh-dan, between Zorah and Eshtaol.",
    note: "The Spirit doesn't rush on Samson immediately — he begins to stir. There is a period of preparation before the full empowerment. This gradual awakening is easily missed in the Samson narrative but is theologically significant: the Spirit's work often has a preparatory phase that precedes visible action.",
    godReveals: "The Spirit's timing is deliberate, not impulsive. The 'stirring' phase has its own purpose. God is at work before anything is publicly visible.",

  },
  "Judg 14:6": {
    verse: "Then the Spirit of the LORD rushed upon him, and although he had nothing in his hand, he tore the lion in pieces as one tears a young goat.",
    note: "The Spirit 'rushed' — a sudden, overwhelming empowerment. This is the most dramatic OT Spirit-language, used also for Saul (1 Sam 11:6) and David (1 Sam 16:13). Samson's personal moral failures are severe, yet the Spirit continues to use him for Israel's deliverance. This is sovereign grace operating despite, not because of, the vessel.",
    godReveals: "The Spirit's empowerment of Samson is not an endorsement of Samson's character — it is a statement about God's commitment to his people. This should not be read as permission for sin; it should be read as evidence of grace that far outstrips human failure.",
    crossRefs: ["1 Sam 10:6", "1 Sam 11:6", "Judg 13:25", "1 Cor 1:26-29"]
  },
  "1 Sam 10:6": {
    verse: "Then the Spirit of the LORD will rush upon you, and you will prophesy with them and be turned into another man.",
    note: "Samuel's prophecy to Saul: the Spirit will transform him into a different person. This is the closest the OT comes to the NT's transformative indwelling — and it is, notably, conditional and temporary. Saul's transformation is real but does not go deep. He is changed on the surface but not at the root. The contrast with David is instructive.",
    godReveals: "External Spirit-empowerment can change behavior without changing the heart. Only the new covenant promise (Ezek 36:26-27) addresses the root. This is why the NT's indwelling is categorically greater — it is not just an anointing but a new nature.",
    crossRefs: ["1 Sam 16:13", "1 Sam 16:14", "Ezek 36:26-27", "Gal 5:16-25"]
  },
  "1 Sam 16:13": {
    verse: "Then Samuel took the horn of oil and anointed him in the midst of his brothers. And the Spirit of the LORD rushed upon David from that day forward.",
    note: "'From that day forward' — a permanent anointing, not an episodic empowerment. David's experience of the Spirit is closer to NT indwelling than any other OT figure. Yet Psalm 51 shows that even David feared losing this presence. The stability he experienced was real but still provisional — not yet sealed.",
    godReveals: "God's choice of David illustrates his characteristic pattern: choosing the overlooked, the youngest, the least impressive by external measure — and the Spirit is the explanation for his selection.",
    crossRefs: ["1 Sam 10:6", "Ps 51:11", "Isa 11:1-3", "Acts 13:22"]
  },
  "1 Sam 16:14": {
    verse: "Now the Spirit of the LORD departed from Saul, and a harmful spirit from the LORD tormented him.",
    note: "The most sobering verse in the Judges-Kings Spirit narrative. The Spirit departs. This is the OT baseline: Spirit-empowerment is conditional, and disobedience has consequences. David's prayer in Psalm 51 is born from knowing this verse. The NT's sealed Spirit (Eph 1:13) is the direct answer to this OT anxiety.",
    godReveals: "God does not leave disobedience without consequence. But the NT answers this sobering reality with an irreversible gift — the Spirit as down payment, seal, and guarantee. What Saul lost, believers cannot lose.",
    crossRefs: ["Ps 51:11", "Eph 1:13-14", "Eph 4:30", "Heb 10:29"]
  },
  "2 Sam 23:1-2": {
    verse: "'The Spirit of the LORD speaks by me; his word is on my tongue.'",
    note: "David's last words — his theological self-understanding of the Psalms. He does not claim authorship in the modern sense; he claims to be a vehicle through which the Spirit spoke. This is the OT foundation for 2 Peter 1:21: 'men spoke from God as they were carried along by the Holy Spirit.'",
    godReveals: "Scripture's human authors understood themselves as Spirit-carried, not merely Spirit-assisted. The Bible's divine authority rests on this claim — not that God dictated past the human writers, but that the Spirit spoke through their full humanity.",
    crossRefs: ["2 Pet 1:21", "Ps 51:11", "Ezek 2:2", "Mark 12:36"]
  },
  "1 Kgs 18:12": {
    verse: "'And as soon as I have gone from you, the Spirit of the LORD will carry you I know not where.'",
    note: "Obadiah's concern — spoken to Elijah. The Spirit moves Elijah freely and unpredictably. This is the Spirit's sovereign mobility in the OT: he carries prophets, directs them, removes them. Acts 8:39 echoes this exactly when the Spirit teleports Philip after the Ethiopian eunuch's baptism.",
    godReveals: "The Spirit is not geographically or institutionally tethered. He moves where and when he wills. His mobility is a feature of his sovereignty — he cannot be located, scheduled, or domesticated.",
    crossRefs: ["2 Kgs 2:9-16", "Acts 8:29-39", "Ezek 1", "John 3:8"]
  },
  "2 Kgs 2:9-16": {
    verse: "Elijah said to Elisha, 'Ask what I shall do for you, before I am taken from you.' And Elisha said, 'Please let there be a double portion of your spirit on me.'",
    note: "Elisha asks for the firstborn's inheritance — double the portion of the Spirit that rested on Elijah. The chariot of fire and whirlwind are the Spirit's dramatic signature on Elijah's departure. Elisha witnesses it and receives what he asked for. The cloak that falls is the symbol of prophetic succession — Spirit-carried.",
    godReveals: "The Spirit is transferable and distributable — not diminished by being shared. Elijah's departure does not leave Israel without a prophetic voice; it multiplies one. This anticipates Pentecost: the Spirit given without measure.",
    crossRefs: ["Num 11:16-29", "Acts 2:1-4", "Joel 2:28-29", "John 3:34"]
  },
  "2 Chr 15:1-2": {
    verse: "The Spirit of God came upon Azariah the son of Oded, and he went out to meet Asa and said to him, 'Hear me, O Asa, and all Judah and Benjamin! The LORD is with you while you are with him. If you seek him, he will be found by you, but if you forsake him, he will forsake you.'",
    note: "The Spirit comes on a relatively unknown figure — Azariah — to deliver a word at a critical national moment. The word itself is conditional covenant language: God's presence is responsive to Israel's orientation toward him. This is the OT's honest theology — not unconditional blessing, but a covenant of mutual faithfulness.",
    godReveals: "God's Spirit-inspired words are not always comfortable. Sometimes the Spirit's most urgent message is a warning about the conditions of blessing, not an assurance of it.",
    crossRefs: ["2 Chr 24:20", "Neh 9:20", "Heb 3:7-11", "Rev 2-3"]
  },
  "2 Chr 20:14": {
    verse: "And the Spirit of the LORD came upon Jahaziel the son of Zechariah... in the midst of the assembly. And he said, 'Listen, all Judah and inhabitants of Jerusalem and King Jehoshaphat! Thus says the LORD to you: Do not be afraid and do not be dismayed at this great horde, for the battle is not yours but God's.'",
    note: "The Spirit comes on a Levite — not the king, not the prophet — in the middle of the assembled community, during prayer and worship. The word is military strategy delivered as prophecy: stand still and watch. This is the Spirit overriding human military logic with divine confidence.",
    godReveals: "The Spirit's strategic intelligence transcends human calculation. He gives courage not by removing the threat but by reframing who is actually fighting. The battle belongs to God — the Spirit declares this in the face of overwhelming odds.",
    crossRefs: ["Acts 13:1-4", "Acts 15:28", "Eph 6:17-18", "Ps 46"]
  },
  "2 Chr 24:20": {
    verse: "Then the Spirit of God clothed Zechariah the son of Jehoiada the priest, and he stood above the people and said to them, 'Thus says God, Why do you break the commandments of the LORD, so that you cannot prosper?'... they conspired against him, and by command of the king they stoned him with stones in the court of the house of the LORD.",
    note: "The Spirit's commission does not guarantee the messenger's safety. Zechariah is stoned for the Spirit-given word — rejected by the same people his own father had served. Jesus alludes to Zechariah as the last martyr in the OT (Matt 23:35). The Spirit equips for faithfulness, not for popularity.",
    godReveals: "The Spirit sends people into rejection as well as reception. Fidelity to the Spirit's message is measured by whether it is delivered, not by whether it is welcomed. This reframes the success metrics of Spirit-led ministry.",
    crossRefs: ["Matt 23:35", "Acts 7:51-52", "John 16:2", "Rev 11:7-10"]
  },
  "Neh 9:20,30": {
    verse: "'You gave your good Spirit to instruct them... Many years you bore with them and warned them by your Spirit through your prophets. Yet they would not give ear.'",
    note: "Nehemiah's great prayer looks back over Israel's entire history with the Spirit — sustaining, instructing, warning. The Spirit's faithfulness is set against Israel's persistent unfaithfulness. Despite repeated warnings, Israel would not listen. Yet God continued to send the Spirit through the prophets. His patience is extraordinary.",
    godReveals: "The Spirit's ministry of warning is an act of grace, not harshness. God warns before he judges. The fact that Israel ignored the warnings does not mean the Spirit failed — it means human resistance to the Spirit is a deep and persistent reality.",
    crossRefs: ["Isa 63:10-14", "Acts 7:51", "Eph 4:30", "1 Thess 5:19"]
  },
  "Ps 51:11": {
    verse: "Cast me not away from your presence, and take not your Holy Spirit from me. Restore to me the joy of your salvation, and uphold me with a willing spirit.",
    note: "David's prayer after his sin with Bathsheba. He doesn't primarily fear punishment — he fears losing the Spirit's presence. One of only three uses of 'Holy Spirit' in the OT. David knows the Spirit can depart (as from Saul) and that without the Spirit, he is nothing. This prayer is one NT believers no longer need to pray — the Spirit is sealed.",
    godReveals: "God's presence is his greatest gift. Its withdrawal is the deepest judgment. The NT's permanent indwelling resolves the core anxiety of the OT saint — the fear that sin might cost them the Spirit forever.",
    crossRefs: ["1 Sam 16:14", "Eph 1:13-14", "Eph 4:30", "Heb 10:29"]
  },
  "Ps 104:30": {
    verse: "When you send forth your Spirit, they are created, and you renew the face of the ground.",
    note: "The Spirit as the continuous agent of creation's renewal — not just a one-time act at the beginning but an ongoing sustaining presence. Every spring, every birth, every new thing in creation is a Spirit-event. This gives creation a perpetually sacred character.",
    godReveals: "The Spirit is not confined to redemption history. He is the life-principle of all created existence. Every living thing is testimony to the Spirit's sustaining work — whether or not it knows it.",

  },
  "Ps 139:7-8": {

    note: "The Spirit as the personal dimension of God's omnipresence. David is not describing vague divine everywhere-ness — he is saying that wherever he goes, the Spirit of God is there specifically and personally. This can be comforting or confronting depending on the condition of your heart when you read it.",
    godReveals: "God's presence is not optional or escapable. The Spirit is not a tool we deploy — he is the living God who is already wherever we arrive. This strips away any illusion of spiritual privacy.",

  },
  "Ps 143:10": {
    verse: "Teach me to do your will, for you are my God! Let your good Spirit lead me on level ground!",
    note: "David's prayer for guidance — but notice the qualifier: 'your good Spirit.' This is a confession of the Spirit's character, not just his function. The Spirit is intrinsically good, and his guidance leads toward level ground — stability, clarity, a path that doesn't destroy you.",
    godReveals: "The Spirit's guidance is not erratic or harmful — it is good, tending toward human flourishing and spiritual stability. Trusting his direction is not a leap into the unknown; it is confidence in a proven character.",

  },
  "Prov 1:23": {

    note: "Wisdom personified speaks — and she promises the Spirit to those who respond to her reproof. Responsiveness to correction is the condition of Spirit-reception here. This is not the permanent NT indwelling, but it establishes a pattern: the Spirit and the Word work together, and the Spirit is given to the teachable.",
    godReveals: "The Spirit accompanies the Word and is given to those who receive correction. Hardening to reproof is simultaneously hardening to the Spirit. Humility before God's word opens the channel of Spirit-given wisdom.",
